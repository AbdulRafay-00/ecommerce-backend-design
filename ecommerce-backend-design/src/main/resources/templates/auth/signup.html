<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ShopWave</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Join ShopWave today — it's free</p>

      <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

      <form th:action="@{/auth/process-signup}" method="post" th:object="${signupRequest}">

        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input type="text" id="fullName" class="form-control"
                 th:field="*{fullName}" placeholder="Your full name" autocomplete="name"/>
          <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-control"
                 th:field="*{email}" placeholder="you@example.com" autocomplete="email"/>
          <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control"
                 th:field="*{password}" placeholder="Minimum 6 characters" autocomplete="new-password"/>
          <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn-primary" style="width:100%; margin-top:8px;">Create Account</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="/auth/login">Sign in →</a>
      </div>
    </div>
  </div>

  <script th:src="@{/js/app.js}"></script>
</body>
</html>
