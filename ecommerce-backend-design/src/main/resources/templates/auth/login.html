<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ShopWave</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your ShopWave account</p>

      <!-- Flash from signup redirect -->
      <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
      <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

      <form th:action="@{/auth/process-login}" method="post" th:object="${loginRequest}">

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-control"
                 th:field="*{email}" placeholder="you@example.com" autocomplete="email"/>
          <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control"
                 th:field="*{password}" placeholder="••••••••" autocomplete="current-password"/>
          <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit" class="btn-primary" style="width:100%; margin-top:8px;">Sign In</button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="/auth/signup">Sign up →</a>
      </div>

      <!-- Demo credentials hint -->
      <div style="margin-top:20px; padding:14px; background:var(--bg3); border-radius:10px; font-size:0.8rem; color:var(--text-muted);">
        <strong style="color:var(--text);">Demo credentials:</strong><br/>
        Admin: admin@shop.com / admin123<br/>
        User: user@shop.com / user123
      </div>
    </div>
  </div>

  <script th:src="@{/js/app.js}"></script>
</body>
</html>
